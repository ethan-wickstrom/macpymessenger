name: Upload Python Package (uv)

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Build package (sdist + wheel) with uv
        run: uv build

      - name: Smoke test built wheel in a clean environment
        run: |
          uv run --isolated --no-project --python 3.14 \
            --with "$(ls dist/*.whl)" \
            python -c "from macpymessenger import Configuration, IMessageClient, TemplateManager; print('wheel imports OK')"

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
