name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Sync environment
        run: uv sync

      - name: Lint
        run: uv run ruff check

      - name: Type check
        run: uv run ty check

      - name: Test
        run: uv run pytest

      - name: Build documentation
        run: uv run sphinx-build -W docs docs/_build/html

      - name: Build package
        run: uv build
